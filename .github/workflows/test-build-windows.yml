name: Test Builds on Windows

on: [push, pull_request, workflow_dispatch]

jobs:
  build-set-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      id: checkout-code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup glslangValidator
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/HansKristian-Work/vkd3d-proton-ci/main/glslangValidator.exe" -OutFile "glslangValidator.exe"
        Write-Output "$pwd" | Out-File -FilePath "${Env:GITHUB_PATH}" -Append

    - name: Setup Meson
      shell: pwsh
      run: pip install meson

    - name: Find Visual Studio
      shell: pwsh
      run: |
        $installationPath = Get-VSSetupInstance `
          | Select-VSSetupInstance -Require Microsoft.VisualStudio.Workload.NativeDesktop -Latest `
          | Select-Object -ExpandProperty InstallationPath
        Write-Output "VSDEVCMD=${installationPath}\Common7\Tools\VsDevCmd.bat" `
          | Out-File -FilePath "${Env:GITHUB_ENV}" -Append

    - name: Download D3D8 SDK Headers
      shell: pwsh
      run: |
        Invoke-WebRequest -URI https://raw.githubusercontent.com/NovaRain/DXSDK_Collection/master/DXSDK_Aug2007/Include/d3d8.h -OutFile include/d3d8.h
        Invoke-WebRequest -URI https://raw.githubusercontent.com/NovaRain/DXSDK_Collection/master/DXSDK_Aug2007/Include/d3d8types.h -OutFile include/d3d8types.h
        Invoke-WebRequest -URI https://raw.githubusercontent.com/NovaRain/DXSDK_Collection/master/DXSDK_Aug2007/Include/d3d8caps.h -OutFile include/d3d8caps.h

    - name: Apply patches
      shell: python
      run: |
        import os, re

        def patch(path, patches):
            if not os.path.exists(path):
                return
            with open(path, 'r', encoding='utf-8') as f:
                content = f.read()
            original = content
            for old, new in patches:
                content = content.replace(old, new, 1)
            if content != original:
                with open(path, 'w', encoding='utf-8') as f:
                    f.write(content)

        patch('src/d3d11/d3d11_features.cpp', [
            ('     || !features.core.features.multiDrawIndirect\n', ''),
        ])

        caps_path = 'src/dxvk/dxvk_capabilities.cpp'
        if os.path.exists(caps_path):
            with open(caps_path, 'r', encoding='utf-8') as f:
                content = f.read()
            content = re.sub(r'(checkRequired\s*\([^)]*maintenance5[^)]*\))', r'// \1', content)
            content = re.sub(r'(checkRequired\s*\([^)]*maintenance6[^)]*\))', r'// \1', content)
            content = re.sub(r'(checkRequired\s*\([^)]*robustness2[^)]*\))', r'// \1', content)
            content = re.sub(r'(checkRequired\s*\([^)]*load_store_op_none[^)]*\))', r'// \1', content)
            with open(caps_path, 'w', encoding='utf-8') as f:
                f.write(content)

        ctx_path = 'src/dxvk/dxvk_context.cpp'
        if os.path.exists(ctx_path):
            with open(ctx_path, 'r', encoding='utf-8') as f:
                content = f.read()
            helper = '''
static inline void emulateDrawIndirect(
    DxvkCmdList* cmd,
    VkBuffer buffer, VkDeviceSize offset,
    uint32_t count, uint32_t stride,
    bool indexed) {
  for (uint32_t i = 0; i < count; i++) {
    if (indexed)
      cmd->cmdDrawIndexedIndirect(buffer, offset + i * stride, 1, stride);
    else
      cmd->cmdDrawIndirect(buffer, offset + i * stride, 1, stride);
  }
}
'''
            if '#include "dxvk_context.h"' in content:
                content = content.replace('#include "dxvk_context.h"', '#include "dxvk_context.h"\n' + helper)
            with open(ctx_path, 'w', encoding='utf-8') as f:
                f.write(content)

    - name: Get version
      id: get-version
      shell: bash
      run: |
        echo "VERSION_NAME=${GITHUB_REF##*/}-${GITHUB_SHA##*/}" >> $GITHUB_ENV

    - name: Build MSVC x86
      shell: pwsh
      run: |
        & "${Env:COMSPEC}" /s /c "`"${Env:VSDEVCMD}`" -arch=x86 -host_arch=x64 -no_logo && set" `
          | % { , ($_ -Split '=', 2) } `
          | % { [System.Environment]::SetEnvironmentVariable($_[0], $_[1]) }
        meson --buildtype release --backend vs2022 build-msvc-x86
        msbuild -m build-msvc-x86/dxvk.sln

    - name: Build MSVC x64
      shell: pwsh
      run: |
        & "${Env:COMSPEC}" /s /c "`"${Env:VSDEVCMD}`" -arch=x64 -host_arch=x64 -no_logo && set" `
          | % { , ($_ -Split '=', 2) } `
          | % { [System.Environment]::SetEnvironmentVariable($_[0], $_[1]) }
        meson --buildtype release --backend vs2022 build-msvc-x64
        msbuild -m build-msvc-x64/dxvk.sln

    - name: Prepare artifacts
      shell: pwsh
      run: |
        mkdir artifacts\x32
        ls -Path build-msvc-x86\src -Include *.dll,*.pdb -Recurse
          | cp -Destination (Join-Path -Path (pwd) -ChildPath artifacts\x32)
        mkdir artifacts\x64
        ls -Path build-msvc-x64\src -Include *.dll,*.pdb -Recurse
          | cp -Destination (Join-Path -Path (pwd) -ChildPath artifacts\x64)

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dxvk-${{ env.VERSION_NAME }}-msvc-output
        path: artifacts\*
